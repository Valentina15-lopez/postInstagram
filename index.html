<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Breathe Code Photo Feed</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="header">
        <h1>Breathe Code Photo Feed</h1>
    </div>

    <div class="feed">

        <!-- Post 1 -->
        <div class="post">
            <div class="post-header">
                <span class="title">My first photo</span>
                <span class="date">12/14</span>
            </div>

            <div class="post-img">
                <img src="https://picsum.photos/600/400?random=1">
            </div>

            <div class="post-body">
                This is my first photo of the feed. This is a multi line comment for testing purposes. I am learning to code with #BreatheCode
            </div>
        </div>

        <!-- Post 2 -->
        <div class="post">
            <div class="post-header">
                <span class="title">Some cute thing</span>
                <span class="date">12/17</span>
            </div>

            <div class="post-img">
                <img src="https://picsum.photos/600/400?random=2">
            </div>

            <div class="post-body">
                Another example of a photo feed post.
            </div>
        </div>

    </div>

</body>
</html>
